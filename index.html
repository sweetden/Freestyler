<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#22d3ee"/>
  <meta name="description" content="Eco Guard Technologies — Pipeline Security Monitoring System"/>

  <!-- PWA meta -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="EcoGuard"/>
  <meta name="application-name" content="EcoGuard"/>
  <meta name="msapplication-TileColor" content="#060f1e"/>
  <meta name="msapplication-TileImage" content="icons/icon-144.png"/>

  <!--
    Apple touch icons — iOS uses these for the home screen icon.
    180x180 is the canonical modern iPhone size.
    iOS picks the closest size ≥ device requirement, so we provide
    all sizes and let iOS choose the best one.
  -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png"/>
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png"/>
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png"/>
  <link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png"/>
  <link rel="apple-touch-icon" sizes="96x96"   href="icons/icon-96.png"/>
  <!-- Fallback with no size attr — picked by older iOS when nothing else matches -->
  <link rel="apple-touch-icon" href="icons/icon-180.png"/>

  <!-- Web app manifest (Android Chrome, Samsung Internet, Edge, etc.) -->
  <link rel="manifest" href="manifest.json"/>

  <!-- Favicon for browsers -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="96x96"   href="icons/icon-96.png"/>
  <link rel="icon" type="image/png" sizes="32x32"   href="icons/icon-96.png"/>
  <link rel="shortcut icon"         type="image/png" href="icons/icon-192.png"/>

  <title>Eco Guard Technologies</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
